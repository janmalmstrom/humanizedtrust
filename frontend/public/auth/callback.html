<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Ansluter Microsoft 365…</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a0a0f;color:#fff;font-family:system-ui,sans-serif;
         display:flex;align-items:center;justify-content:center;min-height:100vh}
    .wrap{text-align:center;max-width:400px;padding:32px}
    .spinner{width:48px;height:48px;border:3px solid #2e2e33;border-top-color:#0078d4;
             border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 24px}
    @keyframes spin{to{transform:rotate(360deg)}}
    h2{font-size:20px;font-weight:700;margin-bottom:8px}
    p{font-size:14px;color:#888}
    .error{color:#ef4444}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="spinner" id="spinner"></div>
    <h2 id="msg">Hämtar data från Microsoft 365…</h2>
    <p id="sub">Det tar bara ett ögonblick.</p>
  </div>
  <script>
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const code  = params.get('code');
      const error = params.get('error');
      const errorDesc = params.get('error_description');

      // Helper: send result back to opener and close
      function done(payload) {
        if (window.opener && !window.opener.closed) {
          window.opener.postMessage({ type: 'ms-auth', ...payload }, window.location.origin);
        } else {
          // Fallback: store in sessionStorage and redirect back
          sessionStorage.setItem('ms_auth_result', JSON.stringify(payload));
          window.location.href = '/nis2-gap-analys.html';
        }
        window.close();
      }

      if (error) {
        done({ success: false, error: errorDesc || error });
        return;
      }

      if (!code) {
        done({ success: false, error: 'Ingen kod mottagen från Microsoft.' });
        return;
      }

      try {
        const res = await fetch('/api/microsoft-auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code }),
        });
        const data = await res.json();
        done(data);
      } catch (err) {
        done({ success: false, error: 'Nätverksfel — försök igen.' });
      }
    })();
  </script>
</body>
</html>
