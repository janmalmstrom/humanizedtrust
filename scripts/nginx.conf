server {
    listen 80;
    server_name humanizedtrust.xyz www.humanizedtrust.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name humanizedtrust.xyz www.humanizedtrust.xyz;

    ssl_certificate /etc/letsencrypt/live/humanizedtrust.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/humanizedtrust.xyz/privkey.pem;

    root /home/janne/humanizedtrust/frontend/dist;
    index index.html;

    # API proxy
    location /api/ {
        proxy_pass http://localhost:3004/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
